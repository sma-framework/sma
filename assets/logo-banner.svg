  <text x="366" y="286" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="38" font-weight="500" letter-spacing="1.5" fill="#8CA3B8">Shared Memory &amp; Automation</text>
  <text x="366" y="336" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="26" font-weight="400" letter-spacing="0.5" fill="#5A7186">Predictions &#183; reflexes &#183; multi-terminal coordination &#183; never forgets</text>
